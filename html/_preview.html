<!DOCTYPE html>
<!-- DEV-ONLY NUI preview. Not referenced by fxmanifest, never shipped to the game.
     Open with VS Code "Live Server", or screenshot headless (see .claude/reference/nui-preview/README.md).
     NOTE: LmZa_Chat drives the UI with `type`-keyed messages, not `action`. -->
<html lang="en"><head><meta charset="UTF-8"><title>LmZa_Chat Preview</title>
<style>
  :root{--bg:#15110d;--panel:#1f1813;--line:#3a2c20;--txt:#e8ddcc;--accent:#e0902c;--bad:#cc5b4b;}
  *{box-sizing:border-box}html,body{margin:0;height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt)}
  #wrap{display:grid;grid-template-columns:300px 1fr;grid-template-rows:1fr 150px;height:100vh}
  #bar{grid-row:1/3;background:var(--panel);border-right:2px solid var(--line);overflow-y:auto;padding:14px}
  #bar h1{font-size:14px;letter-spacing:1px;color:var(--accent);margin:0 0 2px;text-transform:uppercase}
  #bar .sub{font-size:11px;opacity:.6;margin-bottom:14px}
  #bar h2{font-size:11px;text-transform:uppercase;letter-spacing:1px;opacity:.55;margin:16px 0 6px;border-bottom:1px solid var(--line);padding-bottom:4px}
  button.act{display:block;width:100%;text-align:left;margin:4px 0;padding:8px 10px;background:#2a2017;color:var(--txt);border:1px solid var(--line);border-radius:6px;cursor:pointer;font-size:13px}
  button.act:hover{background:var(--accent);color:#1a130b}button.danger:hover{background:var(--bad);color:#fff}
  /* a faux prairie backdrop so the glass panels read like in-game */
  #stage{grid-column:2;grid-row:1;border:0;width:100%;height:100%;
    background:linear-gradient(180deg,#2b1d3a 0%,#5a3a3a 45%,#8a5a32 75%,#3a2415 100%);}
  #log{grid-column:2;grid-row:2;background:#0d0a07;border-top:2px solid var(--line);margin:0;padding:8px 12px;font-family:Consolas,monospace;font-size:12px;overflow-y:auto;white-space:pre-wrap;line-height:1.5}
  .lo{color:var(--accent)}.lv{color:#9fd}.li{opacity:.5}
</style></head>
<body>
<div id="wrap">
  <div id="bar">
    <h1>🤠 LmZa_Chat Preview</h1><div class="sub">Ranch Lantern theme — open with Live Server</div>
    <h2>Populate</h2>
    <button class="act" data-act="fill">Fill sample conversation</button>
    <button class="act" data-act="self">+ Your message</button>
    <button class="act" data-act="other">+ Other player message</button>
    <button class="act" data-act="system">+ System message</button>
    <h2>Input</h2>
    <button class="act" data-act="open">Open input bar</button>
    <button class="act" data-act="suggest">Load /command suggestions</button>
    <h2>Control</h2>
    <button class="act" data-act="clear">Clear chat</button>
    <button class="act" data-act="reload">↻ Reload UI</button>
  </div>
  <iframe id="stage" title="NUI stage"></iframe>
  <div id="log"><span class="li">// intercepted post() calls (NUI → Lua) appear here…</span></div>
</div>
<script>
const RESOURCE = 'LmZa_Chat';
const stage = document.getElementById('stage'), logEl = document.getElementById('log');
function log(d,a,x){const r=document.createElement('div');r.innerHTML=`<span class="lo">${d} ${a}</span> <span class="lv">${x?JSON.stringify(x):''}</span>`;logEl.appendChild(r);logEl.scrollTop=logEl.scrollHeight;}
const MOCK = `<scr`+`ipt>
  window.GetParentResourceName=function(){return '${RESOURCE}';};
  window.fetch=function(u,o){try{parent.postMessage({__nuiPost:true,action:String(u).split('/').pop(),body:o&&o.body?JSON.parse(o.body):null},'*');}catch(e){}
    return Promise.resolve(new Response('{}',{status:200,headers:{'Content-Type':'application/json'}}));};
<\/scr`+`ipt>`;
async function loadUI(){const raw=await(await fetch('index.html')).text();stage.srcdoc=raw.replace(/<head[^>]*>/i,m=>m+MOCK);}

function ts(){const d=new Date();let h=d.getHours(),m=String(d.getMinutes()).padStart(2,'0');const ap=h>=12?'PM':'AM';h=h%12||12;return `${h}:${m} ${ap}`;}
function send(o){stage.contentWindow.postMessage(o,'*');log('→',o.type,o);}
function msg(name,text,isSelf){send({type:'ON_MESSAGE',name,message:text,timestamp:ts(),isSelf:!!isSelf});}

const SAMPLE = {
  self:   () => msg('YOU','well howdy there, neighbour',true),
  other:  () => msg('JESSE WILLIAMS','evening, partner — fine night for it',false),
  system: () => send({type:'ON_SYSTEM',message:'Welcome to the ranch.',timestamp:ts()}),
  open:   () => send({type:'ON_OPEN'}),
  clear:  () => send({type:'ON_CLEAR'}),
  suggest:() => send({type:'ON_SUGGESTIONS',suggestions:[
                  {name:'/me',help:'emote an action'},
                  {name:'/clear',help:'clear the chat'},
                  {name:'/ranch',help:'manage your ranch'}]}),
  reload: () => loadUI(),
  fill:   () => {
    msg('SHERIFF MALLOY','keep it civil in town, folks',false);
    msg('YOU','yes sir',true);
    msg('JESSE WILLIAMS','anyone seen my horse? brown mare, answers to Daisy',false);
    send({type:'ON_SYSTEM',message:'Daisy has wandered off near the ranch.',timestamp:ts()});
    msg('YOU','check the north pasture',true);
  }
};
const AUTO=new URLSearchParams(location.search).get('auto');
stage.addEventListener('load',()=>{log('⟳','UI loaded'+(AUTO?` — auto "${AUTO}"`:''),null);
  setTimeout(()=>{ SAMPLE.fill(); if(AUTO && AUTO!=='fill' && SAMPLE[AUTO]) setTimeout(SAMPLE[AUTO],250); }, 200);});
window.addEventListener('message',e=>{if(e.data&&e.data.__nuiPost)log('←',e.data.action,e.data.body);});
document.querySelectorAll('button.act').forEach(b=>b.addEventListener('click',()=>(SAMPLE[b.dataset.act]||(()=>{}))()));
loadUI();
</script>
</body></html>
